{% extends "sidebar.html" %}

{% block title %}Confirmar Cierre de Sesión{% endblock %}

{% block content %}
<main class="contenidoGeneral">
    <div class="confirmar-container">
        <div class="confirmar-box">
            <div class="confirmar-icono">🚪</div>
            <h2>¿Cerrar sesión?</h2>
            <p>Se cerrará tu sesión actual en Coffee Hacienda.</p>
            <div class="btn-container">
                <a href="{{ url_for('auth.salir') }}" class="btn-confirmar">Sí, cerrar sesión</a>
                <a href="{{ url_for('bienvenida') }}" class="btn-cancelar">No, cancelar</a>
            </div>
        </div>
    </div>
</main>
{% endblock %}
